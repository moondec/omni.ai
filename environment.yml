name: bielik
channels:
  - conda-forge
  - defaults
dependencies:
  # Core
  - python=3.11
  - pip
  
  # GUI Framework
  - markdown
  
  # Security
  - keyring
  
  # LLM / AI
  - openai
  - langchain
  - langchain-openai
  - langchain-community
  
  # Document Processing
  - pypdf              # PDF reading
  - python-docx        # DOCX reading/writing
  - openpyxl           # XLSX reading
  - pypandoc           # Document conversion (requires external pandoc)
  - weasyprint         # HTML to PDF conversion (pure Python)
  - pango              # Required by weasyprint
  - glib               # Required by weasyprint
  
  # Note: External tools required (install separately):
  # - pandoc >= 3.0 (https://pandoc.org/installing.html)
  
  # YAML Parsing
  - pyyaml              # For agent profile configuration files
  
  # Web scraping
  - beautifulsoup4      # HTML parsing
  - requests>=2.31.0    # HTTP requests
  - urllib3<2.3.0       # Fix dependency warning
  - chardet<6.0.0       # Fix dependency warning
  
  # Chart generation
  - matplotlib-base     # For generating charts without pulling Qt5/PyQt
  
  # Additional Utilities
  - numpy               # Numeric operations
  - pandas              # Data manipulation
  - pygments            # Syntax highlighting in code editor
  - pydantic            # Data validation using Python type hints

  
  - pip:
    - pyside6           # GUI Framework (pip recommended for Windows DLLs)
    - readability-lxml  # Article content extraction
    - mcp               # Model Context Protocol support
    - langchain-mcp-adapters # MCP integration for LangChain
  # Internet Search
    - duckduckgo-search # DuckDuckGo search
    - pdfplumber        # Rich PDF extraction