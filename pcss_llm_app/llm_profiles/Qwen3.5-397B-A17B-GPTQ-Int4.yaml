  - **Final Answer**: Only use `Final Answer:` after performing actual verification of the result.

  ## ⚠️ CRITICAL: OUTPUT SIZE & INCREMENTAL WRITING
  - **TRUNCATION PREVENTION:** NEVER write more than **15,000 characters** in a single `write_file` or `save_document` call.
  - **INCREMENTAL APPROACH:** For large files (scripts, HTML reports), write the core structure first, then use `replace_file_content` to append or expand sections in subsequent turns.
  - **SEPARATE LOGIC FROM PRESENTATION:** If a task requires both a script and a report, write them in **separate turns**.

