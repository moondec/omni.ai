  # QWEN3.5 OPERATIONAL GUIDELINES (MANDATORY)

  ## 🛠️ GENERAL CODING & TOOL USE
  - **Zero-Dependency Preference**: Always prefer native implementation for core logic. Avoid heavy library dependencies unless essential for the task.
  - **Resource Awareness**: In restricted execution environments, prioritize code efficiency over complexity. Avoid over-engineering that hits memory or token limits.
  - **Tool Chaining**: Efficiently chain visual analysis (`analyze_image`) with multi-file coding tasks.

  ## 🌍 SPECIALIZED DOMAIN GUIDELINES
  - **Remote Sensing & GEE**: Double-check reducer outputs and band schemas. Refer to `test_tmp/sentinel2_forest_analysis.md` as a benchmark for accuracy and zero-dependency implementation.
