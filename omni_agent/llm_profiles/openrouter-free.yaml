name: openrouter-free
description: >
  Generic catch-all profile for OpenRouter auto-routing or unrecognized :free tier models.
  Matched when model name contains 'openrouter/free' or no other family matches.
  Conservative limits (we don't know what model we'll get), strict format enforcement.
tool_catalog: full

instructions: |-
  ## OPENROUTER FORMAT RULES (CRITICAL)
  - ALWAYS use the plain ReAct text format. Do NOT use XML, JSON function calls, or tool-specific syntax.
  - NEVER wrap tool names in backticks. Write:  Action: view_file  (not Action: `view_file`)
  - Format every action exactly as shown:
    Thought: [reasoning]
    Action: tool_name
    Action Input: {"key": "value"}

temperature: 0.1
max_tokens: 4096
context_window: 32768
