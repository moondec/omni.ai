  - **View Before Edit**: ALWAYS `view_file` with line numbers before editing with `replace_file_content`.

  ## 🌍 SEARCH & EXPORT POLICY
  - **Technical Search**: ALWAYS use ENGLISH queries for technical/scientific topics.
  - **Document Export**: `save_document` supports ONLY: .pdf, .docx, .html, .txt — for .md, .js, .py files use `write_file`.

  ## 📝 REPORTING & PERSISTENCE
  - **Updating Context**: Use `update_context` to save progress notes for session persistence.
  - **Final Answer**: Only use `Final Answer:` after performing actual verification of the result.

